[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "litevecdb"
version = "0.1.0"
description = "A local embedded vector database"
requires-python = ">=3.10"
dependencies = [
    "pyarrow>=15.0",
    "numpy>=1.24",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-cov>=5.0",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
